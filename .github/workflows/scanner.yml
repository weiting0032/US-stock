name: US Stock Scanner

# ── 觸發時間（UTC）────────────────────────────────────────────────────────────
# 1. UTC 13:00 (Mon-Fri) = 台灣 21:00 = 美東 09:00 盤前  → 持倉/Watchlist 掃描
# 2. UTC 21:30 (Mon-Fri) = 台灣 05:30 = 美東 17:30 收盤後 → 持倉/Watchlist 掃描
# 3. UTC 01:00 (Tue-Sat) = 台灣 09:00 = 美東 前日收盤後   → 半導體宇宙全掃描
on:
  schedule:
    - cron: "0 13 * * 1-5"   # 美東盤前（台灣 21:00）→ portfolio
    - cron: "30 21 * * 1-5"  # 美東收盤後（台灣 05:30）→ portfolio
    - cron: "0 1 * * 2-6"    # 台灣 09:00 半導體全掃描（美股前日收盤後）→ semi
  workflow_dispatch:
    inputs:
      scan_mode:
        description: '掃描模式 (portfolio / semi)'
        required: false
        default: 'portfolio'

concurrency:
  group: us-stock-scanner
  cancel-in-progress: true

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 判斷本次觸發為哪種模式 ──────────────────────────────────────────
      # 重要：用 github.event.schedule（觸發當下的 cron 字串）判斷，而非解析時鐘。
      # GitHub Actions 排程常延遲數分鐘～數十分鐘，用時鐘的 MINUTE<15 會把延遲的
      # 01:00 半導體掃描誤判成 portfolio，導致半導體掃描永遠不執行。
      - name: Detect scan mode
        id: mode
        run: |
          MANUAL_MODE="${{ github.event.inputs.scan_mode }}"
          SCHED="${{ github.event.schedule }}"
          if [ "$MANUAL_MODE" == "semi" ] || [ "$SCHED" == "0 1 * * 2-6" ]; then
            echo "mode=semi" >> "$GITHUB_OUTPUT"
            echo "label=美股半導體全掃描"
          else
            echo "mode=portfolio" >> "$GITHUB_OUTPUT"
            echo "label=持倉/Watchlist 掃描"
          fi
          echo "觸發來源 schedule='${SCHED}' manual='${MANUAL_MODE}'"

      # ── 持倉 / Watchlist 掃描 ───────────────────────────────────────────
      - name: Run portfolio scanner
        if: steps.mode.outputs.mode == 'portfolio'
        env:
          TG_TOKEN:             ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:           ${{ secrets.TG_CHAT_ID }}
          GCP_SERVICE_ACCOUNT:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
          PORTFOLIO_SHEET_TITLE: ${{ secrets.PORTFOLIO_SHEET_TITLE }}
          INITIAL_CAPITAL:      ${{ secrets.INITIAL_CAPITAL }}
          MAX_POSITION_WEIGHT:  ${{ secrets.MAX_POSITION_WEIGHT }}
          RISK_PER_TRADE_PCT:   ${{ secrets.RISK_PER_TRADE_PCT }}
          CASH_RESERVE_PCT:     ${{ secrets.CASH_RESERVE_PCT }}
          COOLDOWN_DAYS:        ${{ secrets.COOLDOWN_DAYS }}
          PRE_ALERT_PCT:        ${{ secrets.PRE_ALERT_PCT }}
          ALERT_MIN_MINUTES:    ${{ secrets.ALERT_MIN_MINUTES }}
          ALERT_MIN_PRICE_CHANGE: ${{ secrets.ALERT_MIN_PRICE_CHANGE }}
          ALERT_MIN_SCORE_CHANGE: ${{ secrets.ALERT_MIN_SCORE_CHANGE }}
          MIN_AVG_DOLLAR_VOLUME: ${{ secrets.MIN_AVG_DOLLAR_VOLUME }}
          MIN_PRICE:            ${{ secrets.MIN_PRICE }}
          EARNINGS_BLOCK_DAYS:  ${{ secrets.EARNINGS_BLOCK_DAYS }}
          DEFAULT_COMMISSION:   ${{ secrets.DEFAULT_COMMISSION }}
          DEFAULT_SLIPPAGE_PCT: ${{ secrets.DEFAULT_SLIPPAGE_PCT }}
        run: python scanner.py

      # ── 美股半導體宇宙全掃描 ────────────────────────────────────────────
      - name: Run semiconductor universe scanner
        if: steps.mode.outputs.mode == 'semi'
        env:
          TG_TOKEN:             ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:           ${{ secrets.TG_CHAT_ID }}
          GCP_SERVICE_ACCOUNT:  ${{ secrets.GCP_SERVICE_ACCOUNT }}
          PORTFOLIO_SHEET_TITLE: ${{ secrets.PORTFOLIO_SHEET_TITLE }}
          INITIAL_CAPITAL:      ${{ secrets.INITIAL_CAPITAL }}
          MIN_AVG_DOLLAR_VOLUME: ${{ secrets.MIN_AVG_DOLLAR_VOLUME }}
          MIN_PRICE:            ${{ secrets.MIN_PRICE }}
          EARNINGS_BLOCK_DAYS:  ${{ secrets.EARNINGS_BLOCK_DAYS }}
          # ── 半導體掃描專屬參數（可在 Secrets 或直接設定預設值）──────────
          US_SEMI_SCORE_STRONG: ${{ secrets.US_SEMI_SCORE_STRONG }}
          US_SEMI_SCORE_BUY:    ${{ secrets.US_SEMI_SCORE_BUY }}
          US_SEMI_SCORE_WATCH:  ${{ secrets.US_SEMI_SCORE_WATCH }}
          US_SEMI_SCAN_WORKERS: ${{ secrets.US_SEMI_SCAN_WORKERS }}
          US_SEMI_TOP_N:        ${{ secrets.US_SEMI_TOP_N }}
        run: python scanner.py --semi

      # ── 執行完畢通知 ────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "✅ Scanner 執行完畢"
          echo "模式: ${{ steps.mode.outputs.mode }}"
          echo "時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M') 台灣時間"
