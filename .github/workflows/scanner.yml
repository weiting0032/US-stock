name: US Stock Scanner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          PORTFOLIO_SHEET_TITLE: ${{ secrets.PORTFOLIO_SHEET_TITLE }}
          INITIAL_CAPITAL: ${{ secrets.INITIAL_CAPITAL }}
          MAX_POSITION_WEIGHT: ${{ secrets.MAX_POSITION_WEIGHT }}
          RISK_PER_TRADE_PCT: ${{ secrets.RISK_PER_TRADE_PCT }}
          CASH_RESERVE_PCT: ${{ secrets.CASH_RESERVE_PCT }}
          COOLDOWN_DAYS: ${{ secrets.COOLDOWN_DAYS }}
          PRE_ALERT_PCT: ${{ secrets.PRE_ALERT_PCT }}
          ALERT_MIN_MINUTES: ${{ secrets.ALERT_MIN_MINUTES }}
          ALERT_MIN_PRICE_CHANGE: ${{ secrets.ALERT_MIN_PRICE_CHANGE }}
          ALERT_MIN_SCORE_CHANGE: ${{ secrets.ALERT_MIN_SCORE_CHANGE }}
        run: |
          python scanner.py
